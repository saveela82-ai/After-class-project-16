<html>
<head>
  <title>My Superhero Power Cards</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #eba714;
      text-align: center;
      padding: 100px;
    }
    h1 {
      color: #e716a9;
    }
    p {
      color: #12793d;
    }
    button {
      background-color: #045515;
      color: red;
      border: none;
      padding: 15px 35px;
      border-radius: 1px;
      font-size: 12px;
      cursor: pointer;
    }
    .card-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .hero-card {
      background-color: violet;
      border: 3px solid #ad1414;
      border-radius: 12px;
      width: 220px;
      padding: 18px;
    }
    .hero-name {
      font-size: 22px;
      font-weight: bold;
      color: #222222;
    }
    .hero-power {
      color: #0057b8;
      font-weight: bold;
    }
    .hero-mission {
      color: #666666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>My Superhero Power Cards</h1>
  <p>
    Click the button to create superhero objects using JavaScript classes.
  </p>
  <button onclick="showHeroes()">Show Superheroes</button>
  <div class="card-container" id="heroCards"></div>
  <script>
    class Superhero {
      constructor(name, power, mission) {
        this.name = name;
        this.power = power;
        this.mission = mission;
      }
      describeHero() {
        return "<div class='hero-card'>" +
               "<p class='hero-name'>" + this.name + "</p>" +
               "<p class='hero-power'>Power: " + this.power + "</p>" +
               "<p class='hero-mission'>Mission: " + this.mission + "</p>" +
               "</div>";
      }
    }
    function showHeroes() {

      let hero1 = new Superhero(
        "Captain Code",
        "Debugging errors",
        "Fix broken programs and save the coding world."
      );
      let hero2 = new Superhero(
        "Pixel Flash",
        "Super speed design",
        "Build colourful websites in seconds."
      );
      let hero3 = new Superhero(
        "Logic Girl",
        "Smart problem-solving",
        "Use logic to solve tricky challenges."
      );
      let hero4 = new Superhero(
        "Data Knight",
        "Data protection",
        "Keep important information safe."
      );
      document.getElementById("heroCards").innerHTML =
        hero1.describeHero() +
        hero2.describeHero() +
        hero3.describeHero() +
        hero4.describeHero();
    }
  </script>
</body>
</html>
